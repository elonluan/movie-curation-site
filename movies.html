<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="按标签浏览帧间档案里的精选电影。" />
    <title>电影列表 | 帧间档案</title>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="header-inner">
          <a href="/" class="brand">Frame Archive</a>
          <nav class="nav" aria-label="主导航">
            <a href="/">首页</a>
            <a href="/movies.html" aria-current="page">电影列表</a>
            <a href="/about.html">About</a>
          </nav>
        </div>
      </header>

      <main class="main">
        <section class="page-title reveal">
          <span class="eyebrow">Catalog</span>
          <h1>电影列表</h1>
          <p>以少量标签作为索引，保持观看路径简单清晰。</p>
        </section>

        <section class="section" style="margin-top: 24px;">
          <div id="filter-bar" class="filter-bar" aria-label="标签筛选"></div>
          <div id="movie-grid" class="grid" aria-live="polite"></div>
        </section>
      </main>

      <footer class="site-footer">Frame Archive · <span data-year></span></footer>
    </div>

    <script type="module" src="/scripts/movies.js"></script>
  </body>
</html>
