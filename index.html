<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="帧间档案是一个个人策展式电影展示站，用精选片单和简短文字呈现影像审美。"
    />
    <title>帧间档案 | 个人电影策展站</title>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="header-inner">
          <a href="/" class="brand">Frame Archive</a>
          <nav class="nav" aria-label="主导航">
            <a href="/" aria-current="page">首页</a>
            <a href="/movies.html">电影列表</a>
            <a href="/about.html">About</a>
          </nav>
        </div>
      </header>

      <main class="main">
        <section class="hero reveal">
          <span class="eyebrow">Personal Curated Cinema Shelf</span>
          <h1>帧间档案</h1>
          <p>
            这不是评分工具，也不是信息数据库。这里更像一份持续更新的影像展览目录，
            我用有限片单、关键词与简短注释，记录自己如何被电影触动、塑形与照亮。
          </p>
          <div class="hero-actions">
            <a class="btn primary" href="/movies.html">进入电影列表</a>
            <a class="btn" href="#featured">浏览精选入口</a>
            <a class="btn" href="/about.html">关于这个档案馆</a>
          </div>
        </section>

        <section id="featured" class="section">
          <div class="section-head">
            <h2>精选电影入口</h2>
            <p>从几部最能代表当下审美取向的电影开始。</p>
          </div>
          <div id="featured-grid" class="grid" aria-live="polite"></div>
        </section>
      </main>

      <footer class="site-footer">Frame Archive · <span data-year></span></footer>
    </div>

    <script type="module" src="/scripts/home.js"></script>
  </body>
</html>
