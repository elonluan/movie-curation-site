<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="帧间档案胶片日历展厅。" />
    <title>胶片日历展厅 | 帧间档案</title>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body class="hall-theme calendar-theme">
    <div class="site-shell">
      <header class="site-header">
        <div class="header-inner">
          <a href="/" class="brand">Frame Archive</a>
          <nav class="nav" aria-label="主导航">
            <a href="/">首页</a>
            <a href="/movies.html" aria-current="page">展厅</a>
            <a href="/about.html">About</a>
          </nav>
        </div>
      </header>

      <main class="main">
        <section class="page-title reveal">
          <span class="eyebrow">Hall II</span>
          <h1>胶片日历展厅</h1>
          <p>按观影日期由近到远排序，并可随时按标签筛选时间线。</p>
        </section>

        <section class="section hall-stage" style="margin-top: 24px;">
          <div id="calendar-tag-filter-bar" class="filter-bar" aria-label="标签筛选"></div>
          <div id="calendar-stream" class="calendar-stream" aria-live="polite"></div>
        </section>

        <section class="section cross-hall-nav">
          <div class="section-head">
            <h2>继续参观</h2>
            <p>从日历时间线前往其他展厅。</p>
          </div>
          <div class="cross-hall-grid">
            <a class="hall-entry-card tags" href="/hall-tags.html">
              <span class="hall-kicker">Hall I</span>
              <h3>前往光影地图展厅</h3>
              <p>按国家分类浏览，查看观影分布。</p>
            </a>
            <a class="hall-entry-card score" href="/hall-score.html">
              <span class="hall-kicker">Hall III</span>
              <h3>前往评分展厅</h3>
              <p>切换评分维度，比较偏好变化。</p>
            </a>
          </div>
        </section>
      </main>

      <nav class="hall-float-switch" aria-label="快捷切换展厅">
        <a class="float-switch left tags" href="/hall-tags.html" aria-label="前往光影地图展厅">
          <span>Hall I</span>
          地图
        </a>
        <a class="float-switch right score" href="/hall-score.html" aria-label="前往评分展厅">
          <span>Hall III</span>
          评分
        </a>
      </nav>

      <footer class="site-footer">Frame Archive · <span data-year></span></footer>
    </div>

    <script type="module" src="/scripts/hall-calendar.js"></script>
  </body>
</html>
