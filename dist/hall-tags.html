<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="帧间档案光影地图展厅。" />
    <title>光影地图展厅 | 帧间档案</title>
    <script type="module" crossorigin src="/assets/hallTags-CnUNZylh.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/common-BJ_CqIzc.js">
    <link rel="stylesheet" crossorigin href="/assets/common-CNkS9gez.css">
  </head>
  <body class="hall-theme tags-theme">
    <div class="site-shell">
      <header class="site-header">
        <div class="header-inner">
          <a href="/" class="brand">Frame Archive</a>
          <nav class="nav" aria-label="主导航">
            <a href="/">首页</a>
            <a href="/movies.html" aria-current="page">展厅</a>
            <a href="/about.html">About</a>
          </nav>
        </div>
      </header>

      <main class="main">
        <section class="page-title reveal">
          <span class="eyebrow">Hall I</span>
          <h1>光影地图展厅</h1>
          <p>按国家分类浏览，在地理脉络中回看你的观影分布。</p>
        </section>

        <section class="section hall-stage map-hall-stage" style="margin-top: 24px;">
          <div class="map-filter-wrap">
            <div id="country-filter-bar" class="filter-bar" aria-label="地区目录"></div>
            <div id="country-tag-filter-bar" class="filter-bar" aria-label="类型标签筛选"></div>
          </div>

          <div class="film-map-layout">
            <div id="film-map-stage" class="film-map-stage">
              <svg
                id="film-map-svg"
                class="film-map-svg"
                viewBox="0 0 980 520"
                aria-label="可交互世界电影地图"
                role="img"
              ></svg>
              <aside id="map-preview-card" class="map-preview-card" hidden></aside>
              <button id="map-clear-anchor" class="map-clear-anchor" type="button">取消选中地区</button>
            </div>
          </div>

          <section class="map-screening" aria-live="polite">
            <div class="map-screening-head">
              <div>
                <h2 id="map-screening-title">点击地图中的国家/地区，展开完整片单</h2>
                <p id="map-screening-meta">悬停可快速预览代表电影，点击进入完整展映。</p>
              </div>
              <button id="map-clear-panel" class="btn" type="button">清除选中</button>
            </div>
            <div id="map-screening-grid" class="grid"></div>
          </section>
        </section>

        <section class="section cross-hall-nav">
          <div class="section-head">
            <h2>继续参观</h2>
            <p>从光影地图前往其他展厅。</p>
          </div>
          <div class="cross-hall-grid">
            <a class="hall-entry-card calendar" href="/hall-calendar.html">
              <span class="hall-kicker">Hall II</span>
              <h3>前往胶片日历展厅</h3>
              <p>按照时间线浏览观影记录。</p>
            </a>
            <a class="hall-entry-card score" href="/hall-score.html">
              <span class="hall-kicker">Hall III</span>
              <h3>前往评分展厅</h3>
              <p>切换维度观察评分结构。</p>
            </a>
          </div>
        </section>
      </main>

      <nav class="hall-float-switch" aria-label="快捷切换展厅">
        <a class="float-switch left calendar" href="/hall-calendar.html" aria-label="前往胶片日历展厅">
          <span>Hall II</span>
          日历
        </a>
        <a class="float-switch right score" href="/hall-score.html" aria-label="前往评分展厅">
          <span>Hall III</span>
          评分
        </a>
      </nav>

      <footer class="site-footer">Frame Archive · <span data-year></span></footer>
    </div>

  </body>
</html>
