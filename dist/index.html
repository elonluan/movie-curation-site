<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="帧间档案是一个个人策展式电影展示站，用精选片单和简短文字呈现影像审美。"
    />
    <title>帧间档案 | 个人电影策展站</title>
    <script type="module" crossorigin src="/assets/main-CMfHiOcQ.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/common-BJ_CqIzc.js">
    <link rel="stylesheet" crossorigin href="/assets/common-CNkS9gez.css">
  </head>
  <body class="museum-home">
    <div class="site-shell">
      <header class="site-header">
        <div class="header-inner">
          <a href="/" class="brand">Frame Archive</a>
          <nav class="nav" aria-label="主导航">
            <a href="/" aria-current="page">首页</a>
            <a href="/movies.html">展厅</a>
            <a href="/about.html">About</a>
          </nav>
        </div>
      </header>

      <main class="main">
        <section class="hero reveal">
          <span class="eyebrow">Personal Curated Cinema Shelf</span>
          <h1>帧间档案</h1>
          <p>
            一座个人胶片博物馆：你可以从光影地图进入国家脉络，从胶片日历回看观影时序，
            也可以在评分展厅里观察偏好结构如何被慢慢显影。
          </p>
          <div class="hero-hall-links">
            <a class="hero-hall-card tags reveal" href="/hall-tags.html">
              <span class="hall-kicker">Hall I</span>
              <h3>光影地图展厅</h3>
              <p>按国家分类浏览，追踪你的全球观影版图。</p>
            </a>
            <a class="hero-hall-card calendar reveal" href="/hall-calendar.html">
              <span class="hall-kicker">Hall II</span>
              <h3>胶片日历展厅</h3>
              <p>按时间回看观影轨迹，像翻阅放映日志。</p>
            </a>
            <a class="hero-hall-card score reveal" href="/hall-score.html">
              <span class="hall-kicker">Hall III</span>
              <h3>评分展厅</h3>
              <p>按最终分或维度分重排，看到偏好结构。</p>
            </a>
          </div>
        </section>

        <section id="featured" class="section">
          <div class="section-head">
            <h2>精选电影入口</h2>
            <p>从几部最能代表当下审美取向的电影开始。</p>
          </div>
          <div id="featured-grid" class="grid" aria-live="polite"></div>
        </section>
      </main>

      <footer class="site-footer">Frame Archive · <span data-year></span></footer>
    </div>

  </body>
</html>
