  <body class="hall-theme calendar-theme">
    <div class="site-shell">
      <header class="site-header">
        <div class="header-inner">
          <a href="/" class="brand">Frame Archive</a>
          <nav class="nav" aria-label="主导航">
            <a href="/">首页</a>
            <a href="/movies.html" aria-current="page">展厅</a>
            <a href="/about.html">About</a>
          </nav>
        </div>
      </header>

      <main class="main">
        <section class="page-title reveal">
          <span class="eyebrow">Hall II</span>
          <h1>胶片日历展厅</h1>
          <p>以时间为骨架、以胶片为语言：在纵向卷轴中浏览每次观影曝光。</p>
        </section>

        <section class="section hall-stage reel-hall-stage" style="margin-top: 24px;">
          <div id="calendar-tag-filter-bar" class="filter-bar" aria-label="标签筛选"></div>
          <div id="calendar-month-index" class="month-index-bar" aria-label="月份快速索引"></div>

          <div class="reel-layout">
            <div id="calendar-reel" class="calendar-reel" aria-live="polite"></div>

            <aside class="day-screening-panel" aria-live="polite">
              <div class="day-screening-head">
                <h2 id="day-screening-title">滚动左侧卷轴，右侧同步显影海报</h2>
                <p id="day-screening-meta">当前聚焦日期会自动放大，对应左侧日期词条。</p>
              </div>
              <div id="poster-flow" class="poster-flow"></div>
              <div id="poster-focus-info" class="poster-focus-info"></div>
            </aside>

            <svg id="reel-connector" class="reel-connector" aria-hidden="true">
              <path id="reel-connector-beam" d=""></path>
              <path id="reel-connector-line" d=""></path>
            </svg>
          </div>
        </section>

        <section class="section cross-hall-nav">
          <div class="section-head">
            <h2>继续参观</h2>
            <p>从日历时间线前往其他展厅。</p>
          </div>
          <div class="cross-hall-grid">
            <a class="hall-entry-card tags" href="/hall-tags.html">
              <span class="hall-kicker">Hall I</span>
              <h3>前往光影地图展厅</h3>
              <p>按国家分类浏览，查看观影分布。</p>
            </a>
            <a class="hall-entry-card score" href="/hall-score.html">
              <span class="hall-kicker">Hall III</span>
              <h3>前往评分展厅</h3>
              <p>切换评分维度，比较偏好变化。</p>
            </a>
          </div>
        </section>
      </main>

      <nav class="hall-float-switch" aria-label="快捷切换展厅">
        <a class="float-switch left tags" href="/hall-tags.html" aria-label="前往光影地图展厅">
          <span>Hall I</span>
          地图
        </a>
        <a class="float-switch right score" href="/hall-score.html" aria-label="前往评分展厅">
          <span>Hall III</span>
          评分
        </a>
      </nav>

      <footer class="site-footer">Frame Archive · <span data-year></span></footer>
